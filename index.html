<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GALAXY CLOUD</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* BOUTON INFO EN HAUT A DROITE */
        #info-btn {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; background: #ff0000;
            border-radius: 50%; color: white; font-size: 24px;
            font-weight: bold; cursor: pointer; z-index: 999;
            display: flex; align-items: center; justify-content: center; border: 2px solid white;
        }

        /* PANNEAU D'AIDE */
        #info-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 350px; background: rgba(0,0,0,0.95);
            border: 2px solid white; padding: 20px; border-radius: 15px;
            z-index: 1000; display: none; text-align: center;
        }

        /* FENÊTRE DE ZOOM (AU CENTRE) */
        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: white; padding: 10px;
            border-radius: 10px; z-index: 800; display: none; text-align: center;
        }
        #preview-box img { width: 100%; border-radius: 5px; }
        #preview-box button { margin-top: 10px; background: black; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; }

        /* BOUTON PAYER */
        #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; }
        .pay-btn { background: white; border: none; color: black; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="info-btn" onclick="toggleInfo()">?</div>

    <div id="info-panel">
        <h2>Comment ça marche ?</h2>
        <p>1. Bougez pour naviguer.<br>2. Cliquez sur une image pour l'agrandir.<br>3. Cliquez sur le bouton blanc pour acheter votre place.</p>
        <button onclick="toggleInfo()" style="padding:10px; width:100%;">OK</button>
    </div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <button onclick="closePreview()">Fermer le zoom</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('TON_LIEN_STRIPE_ICI', '_blank')">AJOUTER MA TRACE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let members = [];

        function toggleInfo() {
            const p = document.getElementById('info-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function closePreview() {
            document.getElementById('preview-box').style.display = 'none';
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            for (let i = 0; i < 100; i++) {
                const url = `https://picsum.photos/seed/${i+200}/400/400`;
                const mat = new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load(url), side: THREE.DoubleSide });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), mat);
                plane.position.set((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
                plane.rotation.set(Math.random(), Math.random(), 0);
                plane.userData = { url: url };
                scene.add(plane);
                members.push(plane);
            }

            camera.position.z = 100;

            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(members);
                if (intersects.length > 0) {
                    document.getElementById('zoom-img').src = intersects[0].object.userData.url;
                    document.getElementById('preview-box').style.display = 'block';
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
