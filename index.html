<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITE CLOUD 2026</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .btn-add { background: rgba(255,255,255,0.1); border: 1px solid #fff; color: white; padding: 15px 30px; border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui"><button class="btn-add">Ajouter ma trace (1€)</button></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const starGeometry = new THREE.BufferGeometry();
        const starVertices = [];
        for (let i = 0; i < 10000; i++) { starVertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000)); }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xFFFFFF }));
        scene.add(stars);
        for (let i = 0; i < 40; i++) {
            const geometry = new THREE.PlaneGeometry(5, 7);
            const material = new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load(`https://picsum.photos/seed/${i}/200/300`), side: THREE.DoubleSide });
            const plane = new THREE.Mesh(geometry, material);
            plane.position.set(THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100));
            scene.add(plane);
        }
        camera.position.z = 50;
        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
