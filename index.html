<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GALAXY 360 INFINITE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        
        /* Bouton Info (Log Info) */
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: #00d4ff; border: 2px solid white; border-radius: 50%; color: black;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 5000;
            box-shadow: 0 0 15px #00d4ff; display: flex; align-items: center; justify-content: center;
        }

        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.9); padding: 10px 25px; border-radius: 50px;
            font-weight: bold; z-index: 1000; border: 1px solid #ffcc00; white-space: nowrap;
        }

        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: #000; border: 2px solid #00d4ff;
            padding: 15px; border-radius: 20px; z-index: 6000; display: none; text-align: center;
        }
        #preview-box img { width: 100%; border-radius: 10px; }

        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 20px 50px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 20px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="info-btn" onclick="alert('MODE D\'EMPLOI :\n\n- CLIQUEZ ET GLISSEZ pour tourner la tête partout.\n- SCROLLEZ (souris ou deux doigts) pour avancer.\n- CLIQUEZ sur une photo pour zoomer.')">i</div>

    <div id="vip-counter">OFFRE FONDATION : <span id="slots">942</span> / 1000 PLACES</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <button onclick="document.getElementById('preview-box').style.display='none'" style="margin-top:10px; width:100%; background:#00d4ff; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('TON_LIEN_STRIPE_ICI', '_blank')">REJOINDRE LA GALAXIE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let members = [];
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let scrollVel = 0;

        function init() {
            scene = new THREE.Scene();
            // Suppression du brouillard (nuage) pour une visibilité totale
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();
            for (let i = 0; i < 400; i++) { // Plus d'images pour l'effet "Giga"
                const id = i + 100;
                const mat = new THREE.MeshBasicMaterial({ 
                    map: loader.load(`https://picsum.photos/id/${id}/200/200`), 
                    side: THREE.DoubleSide 
                });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), mat);
                
                // On les place dans une sphère immense
                const r = 100 + Math.random() * 1500;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                plane.position.set(
                    r * Math.sin(phi) * Math.cos(theta), 
                    r * Math.sin(phi) * Math.sin(theta), 
                    r * Math.cos(phi)
                );
                plane.lookAt(0,0,0);
                plane.userData = { hd: `https://picsum.photos/id/${id}/600/600` };
                scene.add(plane);
                members.push(plane);
            }

            // NAVIGATION : Rotation libre (Drag)
            window.addEventListener('mousedown', (e) => { isDragging = true; previousMousePosition = { x: e.clientX, y: e.clientY }; });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    camera.rotation.y -= deltaX * 0.003;
                    camera.rotation.x -= deltaY * 0.003;
                }
                previousMousePosition = { x: e.clientX, y: e.clientY };
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // NAVIGATION : Avancer (Scroll)
            window.addEventListener('wheel', (e) => { scrollVel = e.deltaY * 0.5; });

            // ZOOM
            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(members);
                if (intersects.length > 0) {
                    document.getElementById('zoom-img').src = intersects[0].object.userData.hd;
                    document.getElementById('preview-box').style.display = 'block';
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // On avance vers l'endroit qu'on regarde
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(direction, -scrollVel * 0.05);
            scrollVel *= 0.95; 

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
