<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GALAXY VIP - ULTIMATE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        #vip-counter {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.9); padding: 8px 20px; border-radius: 50px;
            font-weight: bold; z-index: 1000; border: 1px solid #ffcc00; font-size: 14px;
        }
        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; background: #000; border: 2px solid #00d4ff;
            padding: 15px; border-radius: 20px; z-index: 2000; display: none; text-align: center;
        }
        #preview-box img { width: 100%; border-radius: 10px; }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 15px 40px; border-radius: 50px;
            font-size: 18px; font-weight: 900; cursor: pointer; border: none; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="vip-counter">OFFRE VIP : <span id="slots">942</span> / 1000</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <button onclick="document.getElementById('preview-box').style.display='none'" style="margin-top:10px; width:100%; background:#00d4ff; border:none; padding:10px; border-radius:10px; font-weight:bold;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('TON_LIEN_STRIPE_ICI', '_blank')">REJOINDRE LA GALAXIE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let members = [];
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();
            for (let i = 0; i < 100; i++) {
                const id = i + 100;
                const mat = new THREE.MeshBasicMaterial({ map: loader.load(`https://picsum.photos/id/${id}/150/150`) });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), mat);
                plane.position.set((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*300);
                plane.rotation.y = Math.random() * Math.PI;
                plane.userData = { hd: `https://picsum.photos/id/${id}/600/600` };
                scene.add(plane);
                members.push(plane);
            }

            // NAVIGATION : Cliquer-glisser pour bouger
            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                let deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                if (isDragging) {
                    scene.rotation.y += deltaMove.x * 0.005;
                    scene.rotation.x += deltaMove.y * 0.005;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // ZOOM AU CLIC
            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(members);
                if (intersects.length > 0) {
                    document.getElementById('zoom-img').src = intersects[0].object.userData.hd;
                    document.getElementById('preview-box').style.display = 'block';
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) {
                scene.rotation.y += 0.001; // Rotation automatique lente
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
