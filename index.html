<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE INFINITE GALAXY VIP</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* Bouton Info (Le retour !) */
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: #00d4ff; border: none; border-radius: 50%; color: black;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 15px #00d4ff;
        }

        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.9); padding: 10px 25px; border-radius: 50px;
            font-weight: bold; z-index: 1000; border: 1px solid #ffcc00;
        }

        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: #000; border: 2px solid #00d4ff;
            padding: 15px; border-radius: 20px; z-index: 3000; display: none; text-align: center;
        }
        #preview-box img { width: 100%; border-radius: 10px; }

        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 20px 50px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 20px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <button id="info-btn" onclick="alert('BIENVENUE DANS LA GALAXIE\n\n- SCROLLEZ pour avancer à l\'infini.\n- CLIQUEZ sur une image pour la voir en HD.\n- DEVENEZ VIP pour 1€ en cliquant sur le bouton blanc.')">i</button>

    <div id="vip-counter">VIP NOYAU : <span id="slots">942</span> / 1000</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <button onclick="document.getElementById('preview-box').style.display='none'" style="margin-top:10px; width:100%; background:#00d4ff; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('TON_LIEN_STRIPE_ICI', '_blank')">REJOINDRE LA GALAXIE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let members = [];
        let scrollY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();
            // On crée une giga galaxie avec 200 photos
            for (let i = 0; i < 200; i++) {
                const id = i + 100;
                const mat = new THREE.MeshBasicMaterial({ map: loader.load(`https://picsum.photos/id/${id}/200/200`) });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), mat);
                
                // On les éparpille sur une très grande longueur (z de -500 à 500)
                plane.position.set((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*1000);
                plane.userData = { hd: `https://picsum.photos/id/${id}/600/600` };
                
                scene.add(plane);
                members.push(plane);
            }

            // NAVIGATION : Scroll molette ou Drag mobile
            window.addEventListener('wheel', (e) => { scrollY = e.deltaY * 0.1; });
            
            // NAVIGATION : Regard qui suit la souris
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // CLIC : Zoom
            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(members);
                if (intersects.length > 0) {
                    document.getElementById('zoom-img').src = intersects[0].object.userData.hd;
                    document.getElementById('preview-box').style.display = 'block';
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // On avance/recule la caméra
            camera.position.z += scrollY;
            scrollY *= 0.9; // Amortissement

            // Effet de rotation infinie de la galaxie
            scene.rotation.y += 0.001;

            // Suivi du regard
            camera.rotation.y += (-mouse.x * 0.2 - camera.rotation.y) * 0.05;
            camera.rotation.x += (mouse.y * 0.2 - camera.rotation.x) * 0.05;

            // LOGIQUE DE GALAXIE INFINIE : si une photo est trop loin derrière, on la remet devant
            members.forEach(p => {
                if(camera.position.z - p.position.z > 200) p.position.z += 1000;
                if(camera.position.z - p.position.z < -800) p.position.z -= 1000;
            });

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
