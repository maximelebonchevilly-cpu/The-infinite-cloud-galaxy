<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - INFINITE UNIVERSE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        
        /* UI Améliorée */
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: rgba(0, 212, 255, 0.2); border: 2px solid #00d4ff; border-radius: 50%; color: #00d4ff;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #ff0055, #ffcc00); padding: 10px 25px; 
            border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            font-size: 16px; letter-spacing: 1px;
        }

        #ui { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 100%; text-align: center; }
        
        .pay-btn {
            background: #fff; color: #000; padding: 18px 45px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; transition: 0.3s;
        }
        .pay-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px #00d4ff; }

        /* Modal et Preview */
        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: rgba(0,0,0,0.9); border: 1px solid #ffcc00;
            padding: 20px; border-radius: 15px; z-index: 6000; display: none; text-align: center;
            backdrop-filter: blur(10px);
        }
        #zoom-img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="info-btn" onclick="toggleModal()">i</div>
    <div id="vip-counter">CORE MEMBERS : <span id="slots">3</span> / 5000</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <p style="color:#ffcc00; font-weight: bold; letter-spacing: 2px;">EARLY FOUNDER</p>
        <button onclick="document.getElementById('preview-box').style.display='none'" style="width:100%; background:white; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">REJOINDRE LE NOYAU</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let coreGroup = new THREE.Group();
        let nebulaGroup = new THREE.Group();
        let isDragging = false, prevMouse = { x: 0, y: 0 };
        let cloudParticles = [];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0005); // Brouillard pour la profondeur

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 30000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // --- LUMIÈRES ---
            const ambientLight = new THREE.AmbientLight(0x555555);
            scene.add(ambientLight);
            
            const coreLight = new THREE.PointLight(0x00d4ff, 2, 1000);
            coreLight.position.set(0,0,0);
            scene.add(coreLight);

            // --- GÉNÉRATION DE LA NÉBULEUSE (FONDS INFINI 3D) ---
            const loader = new THREE.TextureLoader();
            // Texture de fumée/nuage transparente
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lensflare/lensflare0.png', function(texture) {
                const cloudGeo = new THREE.PlaneBufferGeometry(2000, 2000);
                const cloudMat = new THREE.MeshLambertMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.15,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                for(let p=0; p<50; p++) {
                    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                    cloud.position.set(
                        Math.random()*4000 - 2000,
                        Math.random()*4000 - 2000,
                        Math.random()*8000 - 4000
                    );
                    cloud.rotation.z = Math.random()*2*Math.PI;
                    cloud.material.color.setHSL(0.5, 0.8, 0.5); // Nuances bleutées
                    nebulaGroup.add(cloud);
                    cloudParticles.push(cloud);
                }
            });
            scene.add(nebulaGroup);

            // --- ÉTOILES ---
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<15000; i++) {
                starPos.push(Math.random()*15000-7500, Math.random()*15000-7500, Math.random()*15000-7500);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.7});
            scene.add(new THREE.Points(starGeo, starMat));

            // --- LES PHOTOS DU NOYAU (CORE) ---
            scene.add(coreGroup);
            for (let i = 0; i < 300; i++) {
                const geo = new THREE.PlaneGeometry(15, 15);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0x00d4ff, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8
                });
                const p = new THREE.Mesh(geo, mat);
                const dist = 50 + Math.random() * 200;
                const angle = Math.random() * Math.PI * 2;
                p.position.set(Math.cos(angle)*dist, (Math.random()-0.5)*100, Math.sin(angle)*dist);
                p.lookAt(0,0,0);
                coreGroup.add(p);
            }

            // --- EVENTS ---
            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    nebulaGroup.rotation.y += e.movementX * 0.0005;
                    coreGroup.rotation.y += e.movementX * 0.002;
                    coreGroup.rotation.x += e.movementY * 0.002;
                }
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('wheel', (e) => {
                camera.position.z += e.deltaY * 0.5;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotation automatique lente
            if(!isDragging) {
                coreGroup.rotation.y += 0.001;
                nebulaGroup.rotation.y += 0.0002;
            }

            // Faire en sorte que les nuages fassent toujours face à la caméra
            cloudParticles.forEach(p => {
                p.lookAt(camera.position);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
