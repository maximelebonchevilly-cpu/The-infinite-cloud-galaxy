function spawnShootingStar() {
    // Point de depart aleatoire dans une grande sphere
    var th  = Math.random()*Math.PI*2;
    var ph  = Math.acos(2*Math.random()-1);
    var r   = 4000 + Math.random()*12000;
    var x   = r*Math.sin(ph)*Math.cos(th);
    var y   = r*Math.sin(ph)*Math.sin(th);
    var z   = r*Math.cos(ph);

    // Direction aleatoire
    var dx=Math.random()-0.5, dy=(Math.random()-0.5)*0.4, dz=Math.random()-0.5;
    var dn=Math.sqrt(dx*dx+dy*dy+dz*dz); dx/=dn; dy/=dn; dz/=dn;

    var len   = 180 + Math.random()*320;
    var speed = 60  + Math.random()*120;  // unites par frame (rapide)
    var life  = 1.0;
    var decay = 0.008 + Math.random()*0.012; // vitesse de disparition

    var pts = [
        new THREE.Vector3(x, y, z),
        new THREE.Vector3(x + dx*len, y + dy*len, z + dz*len)
    ];
    var geo  = new THREE.BufferGeometry().setFromPoints(pts);
    var mat  = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true,
        opacity: 0.7 + Math.random()*0.3, depthWrite: false
    });
    var line = new THREE.Line(geo, mat);
    universeGroup.add(line);

    shootingStars.push({
        line: line, geo: geo,
        x:x, y:y, z:z,
        dx:dx, dy:dy, dz:dz,
        len:len, speed:speed,
        life:life, decay:decay,
        mat:mat
    });
}

function updateShootingStars() {
    for (var i = shootingStars.length-1; i >= 0; i--) {
        var s = shootingStars[i];
        s.life -= s.decay;
        s.x += s.dx * s.speed;
        s.y += s.dy * s.speed;
        s.z += s.dz * s.speed;

        // Mettre a jour la geometrie
        var positions = s.geo.attributes.position.array;
        positions[0] = s.x;
        positions[1] = s.y;
        positions[2] = s.z;
        positions[3] = s.x + s.dx*s.len;
        positions[4] = s.y + s.dy*s.len;
        positions[5] = s.z + s.dz*s.len;
        s.geo.attributes.position.needsUpdate = true;
        s.mat.opacity = Math.max(0, s.life) * 0.9;

        if (s.life <= 0) {
            universeGroup.remove(s.line);
            shootingStars.splice(i, 1);
        }
    }
    // Spawn aleatoire : environ 1 etoile filante toutes les 3 secondes
    if (Math.random() < 0.006) spawnShootingStar();
}
