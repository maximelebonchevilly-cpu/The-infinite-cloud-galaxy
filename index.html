<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - VOLUMETRIC 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: #00d4ff; border: 2px solid white; border-radius: 50%; color: black;
            font-size: 22px; font-weight: bold; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00d4ff;
        }
        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #ff0055, #ffcc00); padding: 8px 20px; 
            border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 0 20px #ff0055;
            font-size: 14px; white-space: nowrap;
        }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 100%; text-align: center; }
        .pay-btn {
            background: #fff; color: #000; padding: 15px 30px; border-radius: 50px;
            font-size: 18px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="info-btn">i</div>
    <div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000</div>
    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">JOIN THE CORE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let mainGroup = new THREE.Group();
        let cloudGroup = new THREE.Group(); // Pour les nuages 3D
        let isDragging = false, prevMouse = { x: 0, y: 0 };
        let initialPinchDistance = null;
        let clouds = [];

        function init() {
            scene = new THREE.Scene();
            // Fog pour que les nuages au loin disparaissent dans le noir
            scene.fog = new THREE.FogExp2(0x000000, 0.0003);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20000);
            camera.position.set(0, 0, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // Antialias off pour gagner des FPS
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1); // Limite le ratio pour éviter le lag
            document.body.appendChild(renderer.domElement);
            
            scene.add(mainGroup);
            scene.add(cloudGroup);
            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();

            // --- CRÉATION DES NUAGES 3D (VOLUMÉTRIQUES) ---
            // On utilise une texture de fumée circulaire
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/cloud.png', function(texture) {
                const cloudGeo = new THREE.PlaneGeometry(2000, 2000);
                
                for(let i = 0; i < 60; i++) {
                    const cloudMat = new THREE.MeshLambertMaterial({
                        map: texture,
                        transparent: true,
                        opacity: 0.3,
                        depthWrite: false,
                        blending: THREE.AdditiveBlending,
                        color: new THREE.Color(`hsl(${200 + Math.random() * 50}, 50%, 40%)`) // Nuances de bleu/violet
                    });

                    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                    // Placement aléatoire dans un immense cube 3D
                    cloud.position.set(
                        (Math.random() - 0.5) * 10000,
                        (Math.random() - 0.5) * 10000,
                        (Math.random() - 0.5) * 15000 
                    );
                    cloud.rotation.z = Math.random() * Math.PI * 2;
                    cloudGroup.add(cloud);
                    clouds.push(cloud);
                }
            });

            // Lumières pour les nuages
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(0, 0, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // --- ÉTOILES FIXES ---
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<15000; i++) {
                starPos.push((Math.random()-0.5)*20000, (Math.random()-0.5)*20000, (Math.random()-0.5)*20000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 2})));

            // --- GALAXIE VIP CENTRALE ---
            for (let i = 0; i < 400; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), mat);
                const dist = Math.random() * 300;
                const angle = Math.random() * Math.PI * 2;
                plane.position.set(Math.cos(angle)*dist, (Math.random()-0.5)*100, Math.sin(angle)*dist);
                mainGroup.add(plane);
            }

            // --- NAVIGATION ---
            window.addEventListener('wheel', (e) => { camera.position.z += e.deltaY * 2; });

            window.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                } else {
                    isDragging = true;
                    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && initialPinchDistance) {
                    const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    camera.position.z += (initialPinchDistance - currentDistance) * 5; 
                    initialPinchDistance = currentDistance;
                } else if (isDragging) {
                    cloudGroup.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.001;
                    mainGroup.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.005;
                    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            });

            window.addEventListener('touchend', () => { isDragging = false; initialPinchDistance = null; });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Les nuages tournent lentement et font toujours face à la caméra (Billboarding)
            clouds.forEach(c => {
                c.lookAt(camera.position);
            });

            if(!isDragging) {
                mainGroup.rotation.y += 0.002;
                cloudGroup.rotation.y += 0.0002;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
