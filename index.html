<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE INFINITE CLOUD GALAXY</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* Interface de paiement stylée */
        #ui { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pay-btn { 
            background: white; 
            border: none; 
            color: black; 
            padding: 18px 40px; 
            border-radius: 50px; 
            font-size: 18px;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }
        
        .pay-btn:hover {
            transform: scale(1.05);
            background: #eee;
        }

        .pay-btn:active {
            transform: scale(0.95);
        }

        .count-info {
            font-size: 14px;
            opacity: 0.7;
        }

        /* Cadre blanc subtil autour du site pour faire "objet" */
        #frame {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="frame"></div>

    <div id="ui">
        <button class="pay-btn" id="checkout-button">
            REJOINDRE LA GALAXIE (Dès 1€)
        </button>
        <div class="count-info">Actuellement : <span id="member-count">0</span> souvenirs flottent ici.</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 1. CONFIGURATION DU PAIEMENT ---
        // !!! C'EST ICI QUE TU METS TON LIEN STRIPE !!!
        const STRIPE_LINK = "METS_TON_LIEN_STRIPE_ICI"; 

        document.getElementById('checkout-button').addEventListener('click', function() {
            // Ouvre le paiement dans un nouvel onglet
            window.open(STRIPE_LINK, '_blank');
        });

        // --- 2. CONFIGURATION DE LA GALAXIE 3D (THREE.JS) ---
        let scene, camera, renderer, members = [];
        let mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lumières pour un effet de profondeur
            const light1 = new THREE.PointLight(0xff00ff, 1, 500); // Lumière violette
            light1.position.set(50, 50, 50);
            scene.add(light1);

            const light2 = new THREE.PointLight(0x00ffff, 1, 500); // Lumière cyan
            light2.position.set(-50, -50, 50);
            scene.add(light2);

            // Lumière d'ambiance
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            // --- CRÉATION DE LA GALAXIE (LES PHOTOS) ---
            // Pour l'instant, on met 300 photos de démonstration.
            const totalMembers = 300; 
            document.getElementById('member-count').innerText = totalMembers;

            for (let i = 0; i < totalMembers; i++) {
                createMember(i);
            }

            // --- GESTION DE LA SOURIS (NAVIGATION) ---
            document.addEventListener('mousemove', onDocumentMouseMove);
            window.addEventListener('resize', onWindowResize);

            camera.position.z = 100;
        }

        // Fonction pour créer une photo flottante
        function createMember(index) {
            // Un petit carré (2x2) pour la photo
            const geometry = new THREE.PlaneGeometry(2, 2);
            
            // On utilise des images aléatoires de Unsplash pour la démo
            const material = new THREE.MeshBasicMaterial({
                map: new THREE.TextureLoader().load(`https://picsum.photos/seed/${index + 10}/200/200`),
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8
            });
            
            const plane = new THREE.Mesh(geometry, material);

            // On les éparpille partout dans l'espace
            plane.position.x = (Math.random() - 0.5) * 200;
            plane.position.y = (Math.random() - 0.5) * 200;
            plane.position.z = (Math.random() - 0.5) * 200;

            // Et on leur donne une rotation aléatoire
            plane.rotation.x = Math.random() * Math.PI;
            plane.rotation.y = Math.random() * Math.PI;

            members.push(plane);
            scene.add(plane);
        }

        // --- GESTION DES MOUVEMENTS DE SOURIS ---
        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        }

        function onWindowResize() {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- LA BOUCLE D'ANIMATION (LÀ OÙ TOUT BOUGE) ---
        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            // --- LA NAVIGATION ---
            // On déplace la caméra doucement en fonction de la souris
            // C'est ça qui donne l'effet de "navigation dedans"
            camera.position.x += (mouseX - camera.position.x) * 0.01;
            camera.position.y += (-mouseY - camera.position.y) * 0.01;
            
            // La caméra regarde toujours le centre de la galaxie
            camera.lookAt(scene.position);

            // --- LE MOUVEMENT DE LA GALAXIE ---
            // On fait tourner toute la scène doucement pour un effet cosmique
            scene.rotation.y += 0.001;
            scene.rotation.x += 0.0005;

            // On fait osciller un peu les images pour qu'elles aient l'air de flotter
            members.forEach(member => {
                member.rotation.y += 0.002;
                member.rotation.x += 0.001;
            });

            renderer.render(scene, camera);
        }

        // Lancement !
        init();
        animate();

    </script>
</body>
</html>
