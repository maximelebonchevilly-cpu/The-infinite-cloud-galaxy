<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - DEEP SPACE V3</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; color:white; touch-action:none; }
        #vip-counter { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:linear-gradient(90deg,#ff0055,#ffcc00); padding:10px 25px; border-radius:50px; font-weight:bold; z-index:1000; box-shadow:0 0 20px rgba(255,0,85,0.5); font-size:14px; letter-spacing:1px; }
        #preview-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; max-width:350px; background:rgba(0,0,0,0.9); border:2px solid #00d4ff; padding:20px; border-radius:20px; z-index:6000; display:none; text-align:center; backdrop-filter: blur(10px); }
        #zoom-img { width:100%; border-radius:10px; margin-bottom:15px; box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        #ui { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:1000; width:100%; text-align:center; }
        .pay-btn { background:#fff; color:#000; padding:15px 35px; border-radius:50px; font-size:18px; font-weight:900; cursor:pointer; border:none; box-shadow:0 0 30px #00d4ff; transition: 0.3s; }
        .pay-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px #00d4ff; }
        #nav-hint { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); font-size:10px; color:rgba(255,255,255,0.4); z-index:1000; letter-spacing:2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000</div>

<div id="preview-box">
    <img id="zoom-img" src="">
    <p style="color:#00d4ff; font-weight:bold;">★ MEMBRE FONDATEUR ★</p>
    <button onclick="document.getElementById('preview-box').style.display='none'" style="width:100%; background:#00d4ff; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; color:black;">RETOUR</button>
</div>

<div id="ui">
    <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">REJOINDRE LE NOYAU (1€)</button>
</div>
<div id="nav-hint">ZQSD pour voler · Souris pour tourner · Scroll pour zoomer</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

let scene, camera, renderer, raycaster;
let mouse = new THREE.Vector2();
let galaxyGroup = new THREE.Group();
let bgGroup = new THREE.Group();
let allMeshes = [];
let isDragging = false;
let prevMouse = { x:0, y:0 };
let keys = {};

// Helper pour créer des textures de particules lumineuses
function makeSprite(r,g,b) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 128;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(64,64,0,64,64,64);
    grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
    grad.addColorStop(0.2, `rgba(${r},${g},${b},0.5)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,128,128);
    return new THREE.CanvasTexture(canvas);
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205); // Bleu nuit très profond
    scene.fog = new THREE.FogExp2(0x020205, 0.0001); // Brouillard cosmique

    camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 1, 100000);
    camera.position.set(0, 300, 1200);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(bgGroup);
    scene.add(galaxyGroup);
    raycaster = new THREE.Raycaster();

    // 1. ÉTOILES DE FOND DENSES
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<30000; i++) {
        starPos.push((Math.random()-0.5)*70000, (Math.random()-0.5)*70000, (Math.random()-0.5)*70000);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    bgGroup.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 })));

    // 2. LE COEUR LUMINEUX (BULBE)
    const bulbGeo = new THREE.BufferGeometry();
    const bulbPos = [];
    for(let i=0; i<15000; i++) {
        const r = Math.pow(Math.random(), 2) * 300;
        const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
        bulbPos.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th)*0.5, r*Math.cos(ph));
    }
    bulbGeo.setAttribute('position', new THREE.Float32BufferAttribute(bulbPos, 3));
    const bulbMat = new THREE.PointsMaterial({ color: 0xffccaa, size: 25, map: makeSprite(255,200,150), transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false });
    galaxyGroup.add(new THREE.Points(bulbGeo, bulbMat));

    // 3. PHOTOS DU NOYAU
    const loader = new THREE.TextureLoader();
    for(let i=0; i<600; i++) {
        const isVIP = i < 150;
        const url = `https://picsum.photos/id/${(i%800)+20}/400/400`;
        const tex = loader.load(url);
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: isVIP ? 1 : 0.7 });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(isVIP?25:15, isVIP?25:15), mat);

        if(isVIP) {
            const r = Math.random()*180, t = Math.random()*Math.PI*2;
            plane.position.set(Math.cos(t)*r, (Math.random()-0.5)*80, Math.sin(t)*r);
        } else {
            const t2 = (i-150)/450, angle = t2 * Math.PI * 5;
            const radius = 250 + t2 * 800;
            plane.position.set(Math.cos(angle)*radius, (Math.random()-0.5)*40, Math.sin(angle)*radius);
        }
        plane.lookAt(0,0,0);
        plane.userData = { hd: url };
        galaxyGroup.add(plane);
        allMeshes.push(plane);
    }

    // 4. ÉVÉNEMENTS & CONTRÔLES
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    
    renderer.domElement.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(isDragging) {
            galaxyGroup.rotation.y += e.movementX * 0.003;
            galaxyGroup.rotation.x += e.movementY * 0.003;
        }
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('wheel', e => {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        camera.position.addScaledVector(dir, -e.deltaY * 1.5);
    }, { passive: true });

    window.addEventListener('click', () => {
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(allMeshes);
        if(hits.length > 0) {
            document.getElementById('zoom-img').src = hits[0].object.userData.hd;
            document.getElementById('preview-box').style.display = 'block';
        }
    });

    function updateNav() {
        const speed = 8;
        const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
        const side = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
        if(keys['KeyW']) camera.position.addScaledVector(fwd, speed);
        if(keys['KeyS']) camera.position.addScaledVector(fwd, -speed);
        if(keys['KeyA']) camera.position.addScaledVector(side, -speed);
        if(keys['KeyD']) camera.position.addScaledVector(side, speed);
        if(keys['KeyE']) camera.position.y += speed;
        if(keys['KeyQ']) camera.position.y -= speed;
    }

    function animate() {
        requestAnimationFrame(animate);
        updateNav();
        if(!isDragging) {
            galaxyGroup.rotation.y += 0.0005;
            bgGroup.rotation.y += 0.0001;
        }
        renderer.render(scene, camera);
    }
    animate();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
