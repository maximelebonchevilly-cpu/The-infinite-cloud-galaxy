<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CORE 5000 - IMMERSION TOTALE</title>
    <style>
        /* --- LE STYLE (CSS) --- */
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
            touch-action: none; 
        }

        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: #00d4ff; border: 2px solid white; border-radius: 50%; color: black;
            font-size: 22px; font-weight: bold; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00d4ff;
        }

        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.8); padding: 10px 25px; 
            border-radius: 50px; font-weight: bold; z-index: 1000; 
            box-shadow: 0 0 20px #ff0055; border: 1px solid #ffcc00;
            font-size: 14px; letter-spacing: 1px;
        }

        #ui { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; width: 100%; text-align: center; 
        }

        .pay-btn {
            background: #fff; color: #000; padding: 18px 40px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } 
            50% { transform: scale(1.08); box-shadow: 0 0 40px #00d4ff; } 
            100% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } 
        }
    </style>
</head>
<body>

    <!-- --- L'INTERFACE (HTML) --- -->
    <div id="info-btn">i</div>
    <div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000</div>
    
    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">JOIN THE CORE (1€)</button>
    </div>

    <!-- --- LE MOTEUR 3D (Bibliothèque Three.js) --- -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- --- TON SCRIPT PERSONNEL --- -->
    <script>
        let scene, camera, renderer, raycaster;
        let mainGroup = new THREE.Group();
        let cloudGroup = new THREE.Group();
        let isDragging = false, prevMouse = { x: 0, y: 0 };
        let clouds = [];

        function init() {
            // 1. Création de la Scène
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.0006); // Profondeur mystérieuse

            // 2. Caméra
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.z = 1000;

            // 3. Rendu (Renderer)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            scene.add(mainGroup);
            scene.add(cloudGroup);

            // 4. Lumières
            const centralLight = new THREE.PointLight(0x00d4ff, 3, 1500);
            centralLight.position.set(0, 0, 0);
            scene.add(centralLight);
            scene.add(new THREE.AmbientLight(0x111122));

            const loader = new THREE.TextureLoader();

            // 5. Création des nuages de gaz (Texture nébuleuse)
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lensflare/lensflare0.png', function(texture) {
                const cloudGeo = new THREE.PlaneGeometry(1500, 1500);
                for(let i = 0; i < 70; i++) {
                    const cloudMat = new THREE.MeshLambertMaterial({
                        map: texture,
                        transparent: true,
                        opacity: 0.25,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        color: new THREE.Color(`hsl(${190 + Math.random() * 40}, 100%, 50%)`)
                    });

                    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                    cloud.position.set(
                        (Math.random() - 0.5) * 4000,
                        (Math.random() - 0.5) * 4000,
                        (Math.random() - 0.5) * 5000
                    );
                    cloud.rotation.z = Math.random() * Math.PI;
                    cloudGroup.add(cloud);
                    clouds.push(cloud);
                }
            });

            // 6. Étoiles fixes au loin
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<15000; i++) {
                starPos.push((Math.random()-0.5)*15000, (Math.random()-0.5)*15000, (Math.random()-0.5)*15000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.2});
            scene.add(new THREE.Points(starGeo, starMat));

            // 7. Particules du centre (Le Noyau)
            for (let i = 0; i < 300; i++) {
                const geo = new THREE.SphereGeometry(2, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
                const particle = new THREE.Mesh(geo, mat);
                const dist = 40 + Math.random() * 250;
                const angle = Math.random() * Math.PI * 2;
                particle.position.set(Math.cos(angle)*dist, (Math.random()-0.5)*80, Math.sin(angle)*dist);
                mainGroup.add(particle);
            }

            // --- ÉVÉNEMENTS ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener('wheel', (e) => {
                camera.position.z += e.deltaY * 0.8;
                if(camera.position.z < 10) camera.position.z = 10;
            });

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    mainGroup.rotation.y += e.movementX * 0.005;
                    cloudGroup.rotation.y += e.movementX * 0.001;
                    camera.position.y -= e.movementY * 0.5;
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(!isDragging) {
                mainGroup.rotation.y += 0.002;
                cloudGroup.rotation.y += 0.0003;
            }

            // Effet Billboarding : les nuages regardent toujours la caméra
            clouds.forEach(c => c.lookAt(camera.position));

            renderer.render(scene, camera);
        }

        // Lancement !
        init();
    </script>
</body>
</html>
