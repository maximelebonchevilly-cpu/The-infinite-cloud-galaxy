<script>
    const ring = document.getElementById('ring');
    const totalPhotos = 500; // Nombre de points affichés pour le visuel test

    for (let i = 0; i < totalPhotos; i++) {
        const photo = document.createElement('div');
        photo.className = 'photo-square';
        
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 300; // Distribution sur toute la zone
        
        // LOGIQUE POUR LE NOYAU PLUS GRAND
        if (distance < 80) {
            // Ces photos sont au centre (le Noyau)
            photo.style.width = "25px";  // Plus grande
            photo.style.height = "25px";
            photo.style.boxShadow = "0 0 10px #ffcc00"; // Lueur dorée pour les VIP
            photo.style.zIndex = "5";
        } else {
            // Ces photos sont dans les anneaux
            photo.style.width = "10px";
            photo.style.height = "10px";
            photo.style.opacity = "0.5";
        }

        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        const z = (Math.random() - 0.5) * 20;

        photo.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
        ring.appendChild(photo);
    }
</script>
