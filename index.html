<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - SATURN PROJECT</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:sans-serif; color:white; touch-action:none; cursor:crosshair; }
        #info-btn { position:fixed; top:20px; right:20px; width:45px; height:45px; background:#00d4ff; border:2px solid white; border-radius:50%; color:black; font-size:22px; font-weight:bold; cursor:pointer; z-index:5000; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px #00d4ff; }
        #vip-counter { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:linear-gradient(90deg,#ff0055,#ffcc00); padding:8px 20px; border-radius:50px; font-weight:bold; z-index:1000; box-shadow:0 0 20px #ff0055; font-size:14px; white-space:nowrap; }
        #info-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; max-width:400px; background:rgba(0,0,0,0.95); border:2px solid #00d4ff; padding:25px; border-radius:20px; z-index:7000; display:none; text-align:left; line-height:1.5; font-size:14px; }
        #preview-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; max-width:350px; background:rgba(0,0,0,0.98); border:2px solid #ffcc00; padding:20px; border-radius:20px; z-index:6000; display:none; text-align:center; }
        #zoom-img { width:100%; height:auto; border-radius:10px; display:block; margin-bottom:15px; }
        #ui { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:1000; width:100%; text-align:center; }
        .pay-btn { background:#fff; color:#000; padding:15px 30px; border-radius:50px; font-size:18px; font-weight:900; cursor:pointer; border:none; box-shadow:0 0 30px #00d4ff; animation:pulse 2s infinite; }
        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
        .close-btn { background:#00d4ff; color:black; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:15px; }
        #nav-hint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); font-size:11px; color:rgba(255,255,255,0.3); z-index:1000; pointer-events:none; white-space:nowrap; letter-spacing:2px; }
        #crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:16px; height:16px; pointer-events:none; z-index:500; opacity:0.3; }
        #crosshair::before,#crosshair::after { content:''; position:absolute; background:white; }
        #crosshair::before { width:1px; height:100%; left:50%; }
        #crosshair::after  { height:1px; width:100%; top:50%; }
    </style>
</head>
<body>

<div id="info-btn" onclick="document.getElementById('info-modal').style.display='block'">i</div>
<div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000</div>
<div id="crosshair"></div>

<div id="info-modal">
    <h2 style="color:#00d4ff;margin-top:0;">THE CORE / LE NOYAU</h2>
    <p><b>Concept :</b> 5000 places pour l'eternite.</p>
    <p><b>Controles :</b> ZSQD = voler. Drag = regarder. Scroll = avancer.</p>
    <button class="close-btn" onclick="document.getElementById('info-modal').style.display='none'">FERMER</button>
</div>
<div id="preview-box">
    <img id="zoom-img" src="">
    <p style="color:#ffcc00;margin:5px 0;font-weight:bold;">FOUNDING MEMBER</p>
    <button onclick="document.getElementById('preview-box').style.display='none'" style="width:100%;background:white;border:none;padding:12px;border-radius:10px;font-weight:bold;cursor:pointer;">BACK</button>
</div>
<div id="ui">
    <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">JOIN THE CORE (1 euro)</button>
</div>
<div id="nav-hint">ZSQD : Voler | Souris : Regarder | Scroll : Vitesse</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

var scene    = new THREE.Scene();
var camera   = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100000);
var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

var raycaster = new THREE.Raycaster();
var mouse2d   = new THREE.Vector2();
var allMeshes = [];
var mesPhotos = ['Thefirst.jpg.jpg','Thesecond.jpg.jpg','Thethird.jpg.jpg'];

var universeGroup = new THREE.Group();
scene.add(universeGroup);

var shootingStars = [];
var camYaw   = 0;
var camPitch = -0.18;
camera.position.set(0, 150, 420);
camera.rotation.order = 'YXZ';

var isDragging = false, prevMouse = { x:0, y:0 }, dragDist = 0, keys = {};

function applyCameraRotation() {
    camera.rotation.y = camYaw;
    camera.rotation.x = camPitch;
}

renderer.domElement.addEventListener('mousedown', function(e) {
    isDragging = true; dragDist = 0;
    prevMouse = { x:e.clientX, y:e.clientY };
});
window.addEventListener('mouseup', function() { isDragging = false; });
window.addEventListener('mousemove', function(e) {
    mouse2d.x = (e.clientX/window.innerWidth)*2-1;
    mouse2d.y = -(e.clientY/window.innerHeight)*2+1;
    if (isDragging) {
        dragDist++;
        camYaw   -= (e.clientX - prevMouse.x) * 0.004;
        camPitch -= (e.clientY - prevMouse.y) * 0.004;
        camPitch  = Math.max(-1.5, Math.min(1.5, camPitch));
        prevMouse = { x:e.clientX, y:e.clientY };
    }
});
window.addEventListener('wheel', function(e) {
    var dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    camera.position.addScaledVector(dir, -e.deltaY * 1.5);
}, { passive:true });
window.addEventListener('keydown', function(e) { keys[e.code]=true; });
window.addEventListener('keyup', function(e) { keys[e.code]=false; });

function applyNav() {
    var SPEED = 12;
    var fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
    var rt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
    if (keys['KeyW']) camera.position.addScaledVector(fwd, SPEED);
    if (keys['KeyS']) camera.position.addScaledVector(fwd, -SPEED);
    if (keys['KeyA']) camera.position.addScaledVector(rt, -SPEED);
    if (keys['KeyD']) camera.position.addScaledVector(rt, SPEED);
    if (keys['KeyQ']) camera.position.y += SPEED;
    if (keys['KeyE']) camera.position.y -= SPEED;
}

function mkSp(r,g,b,s) {
    var sz=128,c=document.createElement('canvas');
    c.width=c.height=sz;
    var ctx=c.getContext('2d'),h=sz/2;
    var grd=ctx.createRadialGradient(h,h,0,h,h,h);
    grd.addColorStop(0,'rgba('+r+','+g+','+b+',1)');
    grd.addColorStop(s||0.1,'rgba('+r+','+g+','+b+',0.7)');
    grd.addColorStop(0.6,'rgba('+r+','+g+','+b+',0.1)');
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,sz,sz);
    return new THREE.CanvasTexture(c);
}

function addPts(verts, color, size, opacity, sprite, blend) {
    if (!verts||verts.length===0) return;
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    var mat = new THREE.PointsMaterial({
        color:color, size:size, transparent:true, opacity:opacity,
        sizeAttenuation:true, depthWrite:false, blending: blend || THREE.AdditiveBlending
    });
    if (sprite) mat.map=sprite;
    universeGroup.add(new THREE.Points(geo,mat));
}

function buildUniverse() {
    // --- 1. NÉBULEUSES RÉELLES (LE FOND) ---
    var nebSpecs = [
        {c:[0, 200, 255], n:5000, r:6000, sz:6000},  // Cyan dense
        {c:[200, 0, 255], n:4000, r:12000, sz:8000}, // Violet profond
        {c:[255, 30, 100], n:3000, r:18000, sz:10000} // Rouge galactique
    ];
    nebSpecs.forEach(spec => {
        var v = [];
        var sp = mkSp(spec.c[0], spec.c[1], spec.c[2], 0.1);
        for(var i=0; i<spec.n; i++){
            var r = spec.r * (0.3 + 0.7 * Math.random());
            var th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
            v.push(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th) * 0.5, r * Math.cos(ph));
        }
        addPts(v, 0xffffff, spec.sz, 0.15, sp);
    });

    // --- 2. REPRISE CODE ORIGINAL ---
    var s1=[]; for (var i=0;i<8000;i++) { var th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=200+Math.random()*1500; s1.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph)); }
    addPts(s1, 0xffffff, 1.5, 0.95, null);
    var s2=[]; for (var i=0;i<20000;i++) { var th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=1500+Math.random()*8000; s2.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph)); }
    addPts(s2, 0xffffff, 1.1, 0.88, null);
    var ml=[]; for (var i=0;i<30000;i++) { var th=Math.random()*Math.PI*2,r=3000+Math.random()*25000,y=(Math.random()-0.5)*(800+r*0.04); ml.push(Math.cos(th)*r,y,Math.sin(th)*r); }
    addPts(ml, 0xeef4ff, 0.6, 0.35, null);

    // Photos Membres
    mesPhotos.forEach(function(url, i) {
        var tex = new THREE.TextureLoader().load(url);
        var mesh = new THREE.Mesh(new THREE.PlaneGeometry(130, 130), new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide }));
        mesh.position.set((i - 1) * 300, 150, 0);
        mesh.userData.hd = url;
        scene.add(mesh);
        allMeshes.push(mesh);
    });

    for (var i=0;i<10;i++) spawnShootingStar();
}

function spawnShootingStar() {
    var th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=5000+Math.random()*15000;
    var x=r*Math.sin(ph)*Math.cos(th), y=r*Math.sin(ph)*Math.sin(th), z=r*Math.cos(ph);
    var dx=Math.random()-0.5, dy=(Math.random()-0.5)*0.4, dz=Math.random()-0.5;
    var dn=Math.sqrt(dx*dx+dy*dy+dz*dz); dx/=dn; dy/=dn; dz/=dn;
    var len=250, speed=100, life=1.0, decay=0.01;
    var pts=[new THREE.Vector3(x,y,z), new THREE.Vector3(x+dx*len, y+dy*len, z+dz*len)];
    var geo=new THREE.BufferGeometry().setFromPoints(pts);
    var mat=new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.8});
    var line=new THREE.Line(geo, mat);
    universeGroup.add(line);
    shootingStars.push({line:line, geo:geo, x:x, y:y, z:z, dx:dx, dy:dy, dz:dz, len:len, speed:speed, life:life, decay:decay, mat:mat});
}

function updateShootingStars() {
    for (var i=shootingStars.length-1; i>=0; i--) {
        var s=shootingStars[i]; s.life-=s.decay; s.x+=s.dx*s.speed; s.y+=s.dy*s.speed; s.z+=s.dz*s.speed;
        var p=s.geo.attributes.position.array;
        p[0]=s.x; p[1]=s.y; p[2]=s.z; p[3]=s.x+s.dx*s.len; p[4]=s.y+s.dy*s.len; p[5]=s.z+s.dz*s.len;
        s.geo.attributes.position.needsUpdate=true; s.mat.opacity=s.life;
        if (s.life<=0) { universeGroup.remove(s.line); shootingStars.splice(i,1); spawnShootingStar(); }
    }
}

function animate() {
    requestAnimationFrame(animate);
    applyNav();
    applyCameraRotation();
    updateShootingStars();
    universeGroup.rotation.y += 0.0002;
    renderer.render(scene, camera);
}

buildUniverse();
animate();

window.addEventListener('resize', function() {
    camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

renderer.domElement.addEventListener('click', function(e) {
    if (dragDist>4) return;
    raycaster.setFromCamera(mouse2d, camera);
    var hits = raycaster.intersectObjects(allMeshes);
    if (hits.length>0) {
        document.getElementById('zoom-img').src=hits[0].object.userData.hd;
        document.getElementById('preview-box').style.display='block';
    }
});
</script>
</body>
</html>
