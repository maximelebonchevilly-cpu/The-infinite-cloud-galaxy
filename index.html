<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - SATURN PROJECT</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: #00d4ff; border: 2px solid white; border-radius: 50%; color: black;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00d4ff;
        }

        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #ff0055, #ffcc00); padding: 10px 25px; 
            border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 0 20px #ff0055;
        }

        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; background: rgba(0,0,0,0.98); border: 2px solid #ffcc00;
            padding: 20px; border-radius: 20px; z-index: 6000; display: none; text-align: center;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
        }

        /* Correction Qualité Image */
        #zoom-img { 
            width: 100%; 
            height: auto;
            border-radius: 10px; 
            display: block;
            margin-bottom: 15px;
            /* Force le navigateur à utiliser la meilleure résolution possible */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: auto;
        }

        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 20px 50px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="info-btn" onclick="alert('ACCÈS VIP 5000 :\n\n- NOYAU CENTRAL : Photos larges.\n- ANNEAUX : Photos standards.\n- NAVIGATION : Glissez pour tourner, Scrollez pour zoomer.')">i</div>
    <div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000 PLACES</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <p style="color:#ffcc00; margin: 5px 0; font-weight: bold;">★ MEMBRE FONDATEUR ★</p>
        <button onclick="document.getElementById('preview-box').style.display='none'" style="width:100%; background:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top: 10px;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">REJOINDRE LE NOYAU (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let mainGroup = new THREE.Group();
        let isDragging = false, prevMouse = { x: 0, y: 0 };

        const mesPhotos = ['Thefirst.jpg.jpg', 'Thesecond.jpg.jpg', 'Thethird.jpg.jpg'];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
            camera.position.set(0, 150, 400);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            document.body.appendChild(renderer.domElement);
            scene.add(mainGroup);
            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();

            for (let i = 0; i < 600; i++) {
                let size, textureURL, isVIP;
                
                if (i < 150) { 
                    size = 22;
                    isVIP = true;
                    textureURL = (i < mesPhotos.length) ? mesPhotos[i] : `https://picsum.photos/id/${i+100}/300/300`;
                } else {
                    size = 12;
                    isVIP = false;
                    textureURL = `https://picsum.photos/id/${i+100}/150/150`;
                }

                const mat = new THREE.MeshBasicMaterial({ 
                    map: loader.load(textureURL), 
                    side: THREE.DoubleSide,
                    transparent: !isVIP,
                    opacity: isVIP ? 1 : 0.8
                });

                const plane = new THREE.Mesh(new THREE.PlaneGeometry(size, size), mat);
                
                if (isVIP) { 
                    const dist = Math.random() * 110;
                    const t = Math.random() * Math.PI * 2;
                    const p = Math.random() * Math.PI;
                    plane.position.set(dist * Math.sin(p) * Math.cos(t), dist * Math.sin(p) * Math.sin(t), dist * Math.cos(p));
                    plane.lookAt(0,0,0);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 180 + Math.random() * 350;
                    plane.position.x = Math.cos(angle) * radius;
                    plane.position.z = Math.sin(angle) * radius;
                    plane.position.y = (Math.random() - 0.5) * 30;
                    plane.lookAt(0, plane.position.y, 0);
                }
                
                // On stocke l'URL brute pour la réutiliser au clic
                plane.userData = { hd: textureURL };
                mainGroup.add(plane);
            }

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    mainGroup.rotation.y += (e.clientX - prevMouse.x) * 0.005;
                    mainGroup.rotation.x += (e.clientY - prevMouse.y) * 0.005;
                }
                prevMouse = { x: e.clientX, y: e.clientY };
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('wheel', (e) => { camera.position.z += e.deltaY * 0.5; });

            // CLIC POUR AFFICHAGE HAUTE QUALITÉ (CORRIGÉ)
            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(mainGroup.children);
                if (intersects.length > 0) {
                    const clickedObj = intersects[0].object;
                    const imgElement = document.getElementById('zoom-img');
                    
                    // On vide l'ancienne image pour éviter le flash
                    imgElement.src = "";

                    // On recharge l'image originale proprement
                    const imgLoader = new Image();
                    imgLoader.src = clickedObj.userData.hd;
                    
                    imgLoader.onload = () => {
                        imgElement.src = imgLoader.src;
                        document.getElementById('preview-box').style.display = 'block';
                    };
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isDragging) mainGroup.rotation.y += 0.001;
            camera.lookAt(0,0,0);
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
