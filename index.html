<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CORE 5000 - SATURN PROJECT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Bandeau du compteur */
        .header-counter {
            position: absolute;
            top: 20px;
            background: linear-gradient(90deg, #ff0066, #ffcc00);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.7);
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Zone de la Galaxie */
        #galaxy-container {
            width: 100%;
            height: 100%;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .saturn-ring {
            position: relative;
            width: 600px;
            height: 600px;
            transform-style: preserve-3d;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotateX(70deg) rotateZ(0deg); }
            to { transform: rotateX(70deg) rotateZ(360deg); }
        }

        .photo-square {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: white;
            opacity: 0.8;
            box-shadow: 0 0 5px white;
        }

        /* Bouton d'action */
        .footer-action {
            position: absolute;
            bottom: 40px;
            z-index: 10;
        }

        .btn-join {
            background: white;
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .btn-join:hover {
            transform: scale(1.1);
            background: #00ffff;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header-counter">
        NOYAU VIP : 0 / 5000 PLACES
    </div>

    <div id="galaxy-container">
        <div class="saturn-ring" id="ring"></div>
    </div>

    <div class="footer-action">
        <a href="https://buy.stripe.com/TON_LIEN_ICI" target="_blank">
            <button class="btn-join">REJOINDRE LE NOYAU (1€)</button>
        </a>
    </div>

    <script>
        const ring = document.getElementById('ring');
        const totalPhotos = 500; // Nombre de points affichés pour le visuel

        for (let i = 0; i < totalPhotos; i++) {
            const photo = document.createElement('div');
            photo.className = 'photo-square';
            
            // Calcul de la forme Saturne (spirale plate)
            const angle = Math.random() * Math.PI * 2;
            const distance = 50 + Math.random() * 250;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            const z = (Math.random() - 0.5) * 10;

            photo.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            
            // Pour ajouter tes propres images plus tard, tu utiliseras :
            // photo.style.backgroundImage = "url('nom-de-ton-image.jpg')";
            // photo.style.backgroundSize = "cover";

            ring.appendChild(photo);
        }
    </script>

</body>
</html>
