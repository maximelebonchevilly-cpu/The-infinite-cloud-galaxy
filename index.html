<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - SATURN PROJECT</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        #info-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: #00d4ff; border: 2px solid white; border-radius: 50%; color: black;
            font-size: 22px; font-weight: bold; cursor: pointer; z-index: 5000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00d4ff;
        }
        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #ff0055, #ffcc00); padding: 8px 20px; 
            border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 0 20px #ff0055;
            font-size: 14px; white-space: nowrap;
        }
        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: rgba(0,0,0,0.98); border: 2px solid #ffcc00;
            padding: 20px; border-radius: 20px; z-index: 6000; display: none; text-align: center;
        }
        #zoom-img { width: 100%; height: auto; border-radius: 10px; display: block; margin-bottom: 15px; image-rendering: high-quality; }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 100%; text-align: center; }
        .pay-btn {
            background: #fff; color: #000; padding: 15px 30px; border-radius: 50px;
            font-size: 18px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="info-btn" onclick="alert('THE CORE 5000\n\n- Touche pour explorer\n- Clique sur une étoile pour voir le membre\n- 1€ pour rejoindre')">i</div>
    <div id="vip-counter">NOYAU VIP : <span id="slots">3</span> / 5000</div>

    <div id="preview-box">
        <img id="zoom-img" src="">
        <p style="color:#ffcc00; margin: 5px 0; font-weight: bold;">★ MEMBRE FONDATEUR ★</p>
        <button onclick="document.getElementById('preview-box').style.display='none'" style="width:100%; background:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">REJOINDRE LE NOYAU (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let mainGroup = new THREE.Group();
        let isDragging = false, prevMouse = { x: 0, y: 0 };

        const mesPhotos = ['Thefirst.jpg.jpg', 'Thesecond.jpg.jpg', 'Thethird.jpg.jpg'];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
            camera.position.set(0, 150, 400);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            scene.add(mainGroup);
            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();
            const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

            for (let i = 0; i < 600; i++) {
                let size, textureURL, isVIP;
                if (i < 150) { 
                    size = 24; isVIP = true;
                    textureURL = (i < mesPhotos.length) ? mesPhotos[i] : `https://picsum.photos/id/${i+100}/500/500`;
                } else {
                    size = 14; isVIP = false;
                    textureURL = `https://picsum.photos/id/${i+100}/200/200`;
                }

                const texture = loader.load(textureURL);
                texture.anisotropy = maxAnisotropy;
                texture.minFilter = THREE.LinearFilter;

                const mat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: !isVIP, opacity: isVIP ? 1 : 0.7 });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(size, size), mat);
                
                if (isVIP) { 
                    const dist = Math.random() * 120;
                    const t = Math.random() * Math.PI * 2;
                    const p = Math.random() * Math.PI;
                    plane.position.set(dist * Math.sin(p) * Math.cos(t), dist * Math.sin(p) * Math.sin(t), dist * Math.cos(p));
                    plane.lookAt(0,0,0);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 200 + Math.random() * 350;
                    plane.position.x = Math.cos(angle) * radius;
                    plane.position.z = Math.sin(angle) * radius;
                    plane.position.y = (Math.random() - 0.5) * 40;
                    plane.lookAt(0, plane.position.y, 0);
                }
                plane.userData = { hd: textureURL };
                mainGroup.add(plane);
            }

            // --- INTERACTIONS SOURIS ---
            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    mainGroup.rotation.y += (e.clientX - prevMouse.x) * 0.005;
                    mainGroup.rotation.x += (e.clientY - prevMouse.y) * 0.005;
                }
                prevMouse = { x: e.clientX, y: e.clientY };
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // --- INTERACTIONS TOUCH (MOBILE) ---
            window.addEventListener('touchstart', (e) => {
                isDragging = true;
                prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }, { passive: false });

            window.addEventListener('touchend', () => isDragging = false);

            window.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    mainGroup.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.005;
                    mainGroup.rotation.x += (e.touches[0].clientY - prevMouse.y) * 0.005;
                    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
                e.preventDefault(); 
            }, { passive: false });

            window.addEventListener('wheel', (e) => { camera.position.z += e.deltaY * 0.4; });

            window.addEventListener('click', handleSelect);
            window.addEventListener('touchend', (e) => { if(!isDragging) handleSelect(e); });

            function handleSelect(e) {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(mainGroup.children);
                if (intersects.length > 0) {
                    const imgElement = document.getElementById('zoom-img');
                    imgElement.src = intersects[0].object.userData.hd;
                    document.getElementById('preview-box').style.display = 'block';
                }
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isDragging) mainGroup.rotation.y += 0.0008;
            camera.lookAt(0,0,0);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
