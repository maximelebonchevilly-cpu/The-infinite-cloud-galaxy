<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GALAXY VIP - ULTIMATE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Interface VIP */
        #vip-counter {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.8); padding: 10px 25px; border-radius: 50px;
            font-weight: bold; border: 1px solid #ffcc00; z-index: 1000; box-shadow: 0 0 20px #ff0055;
        }

        /* Fenêtre de Zoom HD */
        #preview-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: rgba(0, 0, 0, 0.95); border: 2px solid #00d4ff;
            padding: 20px; border-radius: 20px; z-index: 2000; display: none; text-align: center;
        }
        #preview-box img { width: 100%; border-radius: 10px; border: 1px solid #00d4ff; }
        #loading-text { font-size: 12px; color: #00d4ff; margin-bottom: 5px; }

        /* Bouton Action */
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 18px 40px; border-radius: 50px;
            font-size: 20px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        
        #instruction { position: fixed; bottom: 100px; width: 100%; text-align: center; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <div id="vip-counter">OFFRE VIP : <span id="slots">942</span> / 1000</div>
    <div id="instruction">Scrollez pour avancer • Cliquez pour zoomer</div>

    <div id="preview-box">
        <div id="loading-text">CHARGEMENT HD...</div>
        <img id="zoom-img" src="" onload="document.getElementById('loading-text').style.display='none'">
        <button onclick="closePreview()" style="margin-top:15px; width:100%; padding:10px; background:#00d4ff; border:none; font-weight:bold; border-radius:10px; cursor:pointer;">RETOUR</button>
    </div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('TON_LIEN_STRIPE_ICI', '_blank')">DEVENIR VIP (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let members = [];
        let zoomSpeed = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 200);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            // Génération de 150 images en BASSE RÉSOLUTION (vitesse max)
            const loader = new THREE.TextureLoader();
            for (let i = 0; i < 150; i++) {
                const id = i + 500;
                // Version basse res (50px seulement !)
                const lowResUrl = `https://picsum.photos/id/${id}/50/50`;
                const highResUrl = `https://picsum.photos/id/${id}/600/600`;
                
                const material = new THREE.MeshBasicMaterial({ map: loader.load(lowResUrl) });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), material);
                
                plane.position.set((Math.random()-0.5)*250, (Math.random()-0.5)*250, (Math.random()-0.5)*250);
                plane.rotation.y = Math.random() * Math.PI;
                plane.userData = { hd: highResUrl };
                
                scene.add(plane);
                members.push(plane);
            }

            // NAVIGATION : Molette et Tactile
            window.addEventListener('wheel', (e) => { zoomSpeed = e.deltaY * 0.05; });
            
            // NAVIGATION : Mouvement souris (regard)
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // CLIC : Zoom HD
            window.addEventListener('click', (e) => {
                if (e.target.tagName !== 'CANVAS') return;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(members);
                if (intersects.length > 0) {
                    document.getElementById('loading-text').style.display = 'block';
                    document.getElementById('zoom-img').src = intersects[0].object.userData.hd;
                    document.getElementById('preview-box').style.display = 'block';
                }
            });

            animate();
        }

        function closePreview() {
            document.getElementById('preview-box').style.display = 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // On fait avancer la caméra selon le scroll
            camera.position.z += zoomSpeed;
            zoomSpeed *= 0.9; // Freinage progressif

            // Rotation douce selon la souris
            camera.rotation.y += (-mouse.x * 0.1 - camera.rotation.y) * 0.05;
            camera.rotation.x += (mouse.y * 0.1 - camera.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
