<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE - NEBULA IMMERSION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: #fff; color: #000; padding: 15px 30px; border-radius: 50px;
            font-size: 18px; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 0 30px #00d4ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">JOIN THE CORE (1€)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cloudParticles = [];
        let mainGroup = new THREE.Group();
        let isDragging = false, prevMouse = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            // Brouillard très dense pour l'effet de profondeur
            scene.fog = new THREE.FogExp2(0x00111a, 0.001);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 10000);
            camera.position.z = 800;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(scene.fog.color);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x555555);
            scene.add(ambient);

            const light = new THREE.PointLight(0x00d4ff, 50, 1000);
            light.position.set(0, 0, 200);
            scene.add(light);

            // --- NUAGES VOLUMÉTRIQUES (VRAIE MÉTHODE) ---
            const loader = new THREE.TextureLoader();
            // Utilisation d'une texture de fumée circulaire pour éviter les "carrés"
            loader.load("https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/cloud.png", function(texture){
                const cloudGeo = new THREE.PlaneGeometry(800, 800);
                const cloudMat = new THREE.MeshLambertMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.25,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending // Pour que les nuages brillent en se superposant
                });

                for(let p=0; p<40; p++) {
                    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                    cloud.position.set(
                        Math.random()*1500 - 750,
                        Math.random()*1000 - 500,
                        Math.random()*2000 - 1000
                    );
                    cloud.rotation.z = Math.random()*Math.PI;
                    cloud.material.color.setHSL(0.5, 0.8, 0.4); // Teinte Cyan/Bleu
                    cloudParticles.push(cloud);
                    scene.add(cloud);
                }
            });

            // --- ÉTOILES SCINTILLANTES ---
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<5000; i++) {
                starCoords.push(Math.random()*4000-2000, Math.random()*4000-2000, Math.random()*4000-2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 1.5});
            scene.add(new THREE.Points(starGeo, starMat));

            // --- TA GALAXIE VIP ---
            const vipGeo = new THREE.PlaneGeometry(40, 40);
            for(let i=0; i<300; i++) {
                const vipMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
                const m = new THREE.Mesh(vipGeo, vipMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 250;
                m.position.set(Math.cos(angle)*radius, (Math.random()-0.5)*100, Math.sin(angle)*radius);
                m.lookAt(0,0,0);
                mainGroup.add(m);
            }
            scene.add(mainGroup);

            // --- ÉVÉNEMENTS ---
            window.addEventListener('wheel', (e) => { camera.position.z += e.deltaY; });
            
            // Mobile Zoom
            let initialDist = 0;
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    if(initialDist > 0) camera.position.z -= (d - initialDist) * 3;
                    initialDist = d;
                }
                if(e.touches.length === 1) {
                    mainGroup.rotation.y += 0.01;
                }
            });

            animate();
        }

        function animate() {
            cloudParticles.forEach(p => {
                p.rotation.z -= 0.001;
            });
            mainGroup.rotation.y += 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
