<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CORE 5000 - TRUE 3D SPACE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        #vip-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.2); backdrop-filter: blur(10px);
            padding: 10px 25px; border: 1px solid #ff0055; border-radius: 50px;
            font-weight: bold; z-index: 1000; box-shadow: 0 0 20px #ff0055;
        }
        #ui { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .pay-btn {
            background: linear-gradient(45deg, #00d4ff, #0055ff); color: white; 
            padding: 18px 40px; border-radius: 50px; font-size: 20px; font-weight: 900; 
            cursor: pointer; border: none; box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="vip-counter">NOYAU VIP : 3 / 5000</div>

    <div id="ui">
        <button class="pay-btn" onclick="window.open('https://buy.stripe.com/00w14pdy60pj1Of2cm3VC00')">Rejoindre le Noyau</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, raycaster, mouse = new THREE.Vector2();
        let mainGroup = new THREE.Group();
        let starField, nebulaParticles = [];

        function init() {
            scene = new THREE.Scene();
            // Ajout d'un brouillard noir pour créer de la profondeur réelle
            scene.fog = new THREE.FogExp2(0x000000, 0.00015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 50000);
            camera.position.z = 1500;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(mainGroup);

            // --- 1. CRÉATION DES NÉBULEUSES VOLUMÉTRIQUES ---
            const loader = new THREE.TextureLoader();
            // On utilise une texture de particule douce
            const sprite = loader.load('https://threejs.org/examples/textures/sprites/flare.png');
            
            for (let i = 0; i < 300; i++) {
                const material = new THREE.SpriteMaterial({
                    map: sprite,
                    color: new THREE.Color(`hsl(${Math.random() * 60 + 200}, 70%, 40%)`),
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending
                });
                const particle = new THREE.Sprite(material);
                
                // On disperse les nuages dans TOUT l'espace (X, Y, Z)
                particle.position.set(
                    (Math.random() - 0.5) * 15000,
                    (Math.random() - 0.5) * 15000,
                    (Math.random() - 0.5) * 15000
                );
                particle.scale.set(1000 + Math.random() * 2000, 1000 + Math.random() * 2000, 1);
                scene.add(particle);
                nebulaParticles.push(particle);
            }

            // --- 2. CHAMP D'ÉTOILES PROFOND ---
            const starGeo = new THREE.BufferGeometry();
            const starPositions = [];
            for (let i = 0; i < 10000; i++) {
                starPositions.push((Math.random()-0.5)*30000, (Math.random()-0.5)*30000, (Math.random()-0.5)*30000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: true });
            starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);

            // --- 3. LES ÉLÉMENTS VIP (TON CŒUR DE PROJET) ---
            for (let i = 0; i < 500; i++) {
                const geometry = new THREE.PlaneGeometry(30, 30);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    side: THREE.DoubleSide,
                    map: loader.load(`https://picsum.photos/id/${i}/200/200`)
                });
                const card = new THREE.Mesh(geometry, material);
                
                // Distribution en sphère autour du centre
                const phi = Math.acos(-1 + (2 * i) / 500);
                const theta = Math.sqrt(500 * Math.PI) * phi;
                card.position.setFromSphericalCoords(600, phi, theta);
                card.lookAt(0, 0, 0);
                mainGroup.add(card);
            }

            // Lumière centrale
            const light = new THREE.PointLight(0x00d4ff, 5, 3000);
            scene.add(light);

            // Animation et contrôles
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Rotation lente de l'univers
            mainGroup.rotation.y += 0.001;
            starField.rotation.y -= 0.0002;

            // Faire "pousser" les nébuleuses pour un effet de mouvement constant
            nebulaParticles.forEach(p => {
                p.position.z += 1;
                if(p.position.z > 5000) p.position.z = -10000;
            });

            // Navigation au clavier/souris pour tester le zoom
            camera.position.z -= 1.5; // Déplacement automatique vers l'avant (immersion)
            if(camera.position.z < -2000) camera.position.z = 2000;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
